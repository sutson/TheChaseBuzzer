<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Keep cursor inside the window at all times.</title>
		<link rel="stylesheet" href="styleMain.css">
		<script src="../browserFunctions.js"></script>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
		<script src="/socket.io/socket.io.js"></script>
		<script>
			$(document).ready(function() {
				var socket = io({
					transports: ["websocket"]
				});

				let modeType = ModeType.NORMAL;
				if (window.location.pathname.includes("charges")) { modeType = ModeType.CHARGES; } // bool to determine if charge mode currently on
				else if (window.location.pathname.includes("lockout")) { modeType = ModeType.LOCKOUT; }; // bool to determine if lockout mode currently on
				
				socket.emit("refreshUserInfo", modeType);
				$("#toggleChargeMode").text(`${modeType == ModeType.CHARGES ? "Disable" : "Enable"} Charge Mode`);
				$("#toggleBuzzerLockout").text(`${modeType == ModeType.LOCKOUT ? "Disable" : "Enable"} Buzzer Lockouts`);

				socket.on("userInfoToClient", (userInfo, mode, userChargeData) => {
					userInfoToClient(userInfo, mode, userChargeData);
				});

				socket.on("gameStateToClient", (currentTeam, currentScore, mode, userChargeData) => {
					gameStateToClient(currentTeam, currentScore, mode, userChargeData);
				});

				socket.on("clearBuzzers", (currentTeam, mode, userChargeData) => {
					clearBuzzers(currentTeam, mode, userChargeData);
				});

				socket.on("buzzInfoToClient", (buzzInfo) => {
					buzzInfoToClient(buzzInfo, true);
				});

				socket.on("idkListToClient", (idkList) => {
					idkListToClient(idkList);
				});

				socket.on("passToClient", (teamName) => {
					passToClient(teamName, true);
				});

				$("#enableSound").click(function() {
					$("#enableSound").remove()
				});

				$("#plus0").click(function() {
					socket.emit("scoresToServer", 0);
				});

				$("#plus1").click(function() {
					socket.emit("scoresToServer", 1);
				});

				$("#plus2").click(function() {
					socket.emit("scoresToServer", 2);
				});

				$("#unregisterUsers").click(function() {
					socket.emit("unregisterUsers");
					location.reload();
				});

				$("#toggleChargeMode").click(function() {
					socket.emit("toggleModeType", modeType != ModeType.CHARGES ? ModeType.CHARGES : ModeType.NORMAL);
					location.reload();
				});

				$("#toggleBuzzerLockout").click(function() {
					socket.emit("toggleModeType", modeType != ModeType.LOCKOUT ? ModeType.LOCKOUT : ModeType.NORMAL);
					location.reload();
				});

				socket.on("objectionToClient", (userName) => {
					objectionToClient(userName);
					$("#objection").append("<button id='clearObjection' type='button' style='height: 30px;'>Clear Objections</button>");
					$("#clearObjection").click(function() {
						socket.emit("clearObjectionToServer");
					});
				});

				socket.on("clearObjectionToClient", () => {
					clearObjectionToClient();
				});

				socket.on("resetApp", () => {
					location.href = "/";
				});

				socket.on("addBuzzerLockouts", (currentTeamNumber, lockedUser) => {
					if (modeType == ModeType.NORMAL) { return; }
					if (lockedUser) { toggleUserOpacity(lockedUser, true); }
				});

				socket.on("removeBuzzerLockouts", (userId) => {
					toggleUserOpacity(userId, false);
				});
			});
		</script>
	</head>
	<body>
		<p id="message">hi quetz :]</p>
		<div id="enableSound">
			<div id="enableSoundText">
				Click Anywhere to Enable Sound
			</div>
		</div>
		<div id="interface">
			<p id="currentTeam"></p>
			Progress:
			<p id="currentScore"></p>
			<button id="plus0" type="button" style="width: 230px; height: 50px; margin: 5px;">+0 Points</button>
			<br>
			<button id="plus1" type="button" style="width: 110px; height: 50px;">+1 Point</button>
			<button id="plus2" type="button" style="width: 110px; height: 50px;">+2 Points</button>
			<p style="font-size: 11px; margin: 5px;">(all points buttons clear buzzers)</p>
			<p id="firstBuzz" class="firstBuzzHost"></p>
			<p id="objection">
			</p>
			<br>
			<br>
			<br>
			<br>
			<button id="toggleBuzzerLockout" type="button" style="height: 30px;"></button>
			<button id="toggleChargeMode" type="button" style="height: 30px;"></button>
			<br>
			<br>
			<div style="border: 1px solid rgba(255, 255, 255, 0.233);"></div>
			<br>
			<button id="unregisterUsers" type="button" style="height: 30px; margin-bottom: 10px;">Reconnect All Players</button>
			<form action="/reset" method="POST">
				<button type="submit" style="height: 30px;">Reset App (Disconnect Everyone)</button>
			</form>
		</div>
		<div id="userListPanel">
			<div id="PlayersList">
				Players:
				<ul></ul>
			</div>
			<div id="ChasersList">
				Chasers:
				<ul></ul>
			</div>
		</div>
	</body>
</html>
